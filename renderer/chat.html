<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'self'; script-src 'self'; img-src 'self' data:"
    />
    <link rel="stylesheet" href="chat.css" />
    <title>柯基聊天</title>
  </head>
  <body>
    <div id="panel">
      <header id="titlebar">
        <span id="title">🐶 和多吉聊天</span>
        <button id="close" title="收起">✕</button>
      </header>
      <main id="messages"></main>
      <footer id="composer">
        <textarea
          id="input"
          rows="1"
          placeholder="跟多吉说点什么…"
        ></textarea>
        <button id="mic" title="按一下说话，再按一下结束">🎤</button>
        <button id="send" title="发送">↑</button>
      </footer>
    </div>
    <script src="chat.js"></script>
  </body>
</html>
