<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'self'; script-src 'self'; img-src 'self' data:"
    />
    <link rel="stylesheet" href="chat.css" />
    <title>桌宠聊天</title>
  </head>
  <body>
    <div id="panel">
      <header id="titlebar">
        <span id="title">和桌宠聊天</span>
        <div id="titleActions">
          <!-- Lucide / trash-2：清空对话 -->
          <button id="clear" title="清空对话" aria-label="清空对话">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
              <path d="M3 6h18" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
          </button>
          <!-- Lucide / x：收起 -->
          <button id="close" title="收起" aria-label="收起">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
      </header>
      <main id="messages"></main>
      <footer id="composer">
        <textarea
          id="input"
          rows="1"
          placeholder="跟桌宠说点什么…"
        ></textarea>
        <!-- Lucide / arrow-up：发送 -->
        <button id="send" title="发送" aria-label="发送">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="m5 12 7-7 7 7" />
            <path d="M12 19V5" />
          </svg>
        </button>
      </footer>
    </div>
    <script src="chat.js"></script>
  </body>
</html>
