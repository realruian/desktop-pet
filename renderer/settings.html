<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'self'; script-src 'self'; img-src 'self' data:"
    />
    <link rel="stylesheet" href="settings.css" />
    <title>河马设置</title>
  </head>
  <body>
    <div id="panel">
      <header id="titlebar">
        <span id="title">河马设置</span>
        <!-- IconPark / Character / close-small：关闭 -->
        <button id="close" title="关闭" aria-label="关闭">
          <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <path
              d="M14 14L34 34"
              stroke="currentColor"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M14 34L34 14"
              stroke="currentColor"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </header>
      <main id="form">
        <div id="welcome" hidden>
          你好！填一下 API Key 我们就能开始聊天了。
        </div>
        <label class="field">
          <span class="label">API Key <em>必填</em></span>
          <div class="row">
            <input
              id="apiKey"
              type="password"
              autocomplete="off"
              spellcheck="false"
              placeholder="sk-or-... 或 sk-..."
            />
            <!-- IconPark / Base / preview-open：显示/隐藏密码（JS 切换图标）-->
            <button id="toggleKey" type="button" title="显示/隐藏" aria-label="显示或隐藏密码">
              <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
                <path
                  d="M24 12C13 12 5 24 5 24C5 24 13 36 24 36C35 36 43 24 43 24C43 24 35 12 24 12Z"
                  stroke="currentColor"
                  stroke-width="4"
                  stroke-linejoin="round"
                />
                <circle cx="24" cy="24" r="6" stroke="currentColor" stroke-width="4" />
              </svg>
            </button>
          </div>
          <span class="hint"
            >OpenRouter（sk-or- 开头）或 Moonshot 直连都行。Key 只存在你电脑本地</span
          >
        </label>

        <label class="field">
          <span class="label">模型</span>
          <input
            id="model"
            type="text"
            spellcheck="false"
            placeholder="qwen/qwen3-235b-a22b-2507"
          />
          <span class="hint">用 Moonshot 直连填 kimi-latest</span>
        </label>

        <label class="field">
          <span class="label">接口地址</span>
          <input
            id="baseURL"
            type="text"
            spellcheck="false"
            placeholder="https://openrouter.ai/api/v1"
          />
          <span class="hint"
            >Moonshot 直连填 https://api.moonshot.cn/v1</span
          >
        </label>

        <label class="field">
          <span class="label">Obsidian 笔记库 <em>可选</em></span>
          <div class="row">
            <input
              id="vault"
              type="text"
              spellcheck="false"
              placeholder="/Users/.../你的库"
            />
            <!-- IconPark / Office / folder-close：选择文件夹 -->
            <button id="pickVault" type="button" title="选择文件夹" aria-label="选择文件夹">
              <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
                <path
                  d="M5 8H22L26 14H43V40H5V8Z"
                  stroke="currentColor"
                  stroke-width="4"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <span class="hint"
            >填了就会本地检索笔记作为参考；留空跳过</span
          >
        </label>
      </main>
      <footer id="actions">
        <button id="openFile" type="button" title="编辑完整 config.json">
          高级（打开文件）
        </button>
        <span id="status"></span>
        <button id="save" type="button">保存</button>
      </footer>
    </div>
    <script src="settings.js"></script>
  </body>
</html>
