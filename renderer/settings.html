<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'self'; script-src 'self'; img-src 'self' data:"
    />
    <link rel="stylesheet" href="settings.css" />
    <title>桌宠设置</title>
  </head>
  <body>
    <div id="panel">
      <header id="titlebar">
        <span id="title">桌宠设置</span>
        <!-- IconPark / Character / close-small：关闭 -->
        <button id="close" title="关闭" aria-label="关闭">
          <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <path
              d="M14 14L34 34"
              stroke="currentColor"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M14 34L34 14"
              stroke="currentColor"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </header>
      <main id="form">
        <div id="welcome" hidden>
          你好！填一下 API Key 我们就能开始聊天了。
        </div>

        <!-- 服务商预设：一键填好接口地址 -->
        <div class="field">
          <span class="label">服务商</span>
          <div class="presets">
            <button id="presetOpenRouter" type="button" class="preset">
              OpenRouter
            </button>
            <button id="presetAiHubMix" type="button" class="preset">
              AiHubMix
            </button>
          </div>
          <span class="hint">选一个自动填接口地址；两家模型 ID 通用</span>
        </div>

        <label class="field">
          <span class="label">API Key <em>必填</em></span>
          <div class="row">
            <input
              id="apiKey"
              type="password"
              autocomplete="off"
              spellcheck="false"
              placeholder="粘贴你的 API Key"
            />
            <!-- IconPark / Base / preview-open：显示/隐藏密码（JS 切换图标）-->
            <button
              id="toggleKey"
              type="button"
              title="显示/隐藏"
              aria-label="显示或隐藏密码"
            >
              <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
                <path
                  d="M24 12C13 12 5 24 5 24C5 24 13 36 24 36C35 36 43 24 43 24C43 24 35 12 24 12Z"
                  stroke="currentColor"
                  stroke-width="4"
                  stroke-linejoin="round"
                />
                <circle cx="24" cy="24" r="6" stroke="currentColor" stroke-width="4" />
              </svg>
            </button>
          </div>
          <span class="hint">Key 只存在你电脑本地，不上传</span>
        </label>

        <!-- 模型：主流 OpenRouter 模型下拉（ID 在 OpenRouter / AiHubMix 通用）-->
        <div class="field">
          <span class="label">模型</span>
          <select id="model">
            <optgroup label="Anthropic Claude">
              <option value="anthropic/claude-opus-4.8">Claude Opus 4.8（旗舰）</option>
              <option value="anthropic/claude-sonnet-4.6">Claude Sonnet 4.6（均衡主力）</option>
              <option value="anthropic/claude-haiku-4.5">Claude Haiku 4.5（快·省）</option>
            </optgroup>
            <optgroup label="OpenAI">
              <option value="openai/gpt-5.5">GPT-5.5（旗舰）</option>
              <option value="openai/gpt-5.4-mini">GPT-5.4 mini（快·省）</option>
              <option value="openai/o4-mini">o4-mini（推理）</option>
            </optgroup>
            <optgroup label="Google Gemini">
              <option value="google/gemini-2.5-pro">Gemini 2.5 Pro</option>
              <option value="google/gemini-3.5-flash">Gemini 3.5 Flash（快）</option>
            </optgroup>
            <optgroup label="DeepSeek">
              <option value="deepseek/deepseek-v4-flash">DeepSeek V4 Flash（热门·快）</option>
              <option value="deepseek/deepseek-v4-pro">DeepSeek V4 Pro</option>
            </optgroup>
            <optgroup label="Moonshot Kimi">
              <option value="moonshotai/kimi-k2.6">Kimi K2.6</option>
              <option value="moonshotai/kimi-k2.5">Kimi K2.5</option>
            </optgroup>
            <optgroup label="其它主流">
              <option value="qwen/qwen3.7-max">Qwen3.7 Max</option>
              <option value="qwen/qwen3.6-flash">Qwen3.6 Flash（快·省）</option>
              <option value="z-ai/glm-5">GLM-5</option>
              <option value="z-ai/glm-4.7">GLM-4.7</option>
              <option value="minimax/minimax-m3">MiniMax M3</option>
              <option value="x-ai/grok-4.3">Grok 4.3</option>
              <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
            </optgroup>
            <option value="__custom__">自定义（手动输入 ID）…</option>
          </select>
          <input
            id="modelCustom"
            type="text"
            spellcheck="false"
            placeholder="vendor/model-id，如 deepseek/deepseek-chat"
            hidden
          />
          <span class="hint" id="modelHint">选一个主流模型；ID 在 OpenRouter / AiHubMix 通用</span>
        </div>

        <label class="field">
          <span class="label">接口地址</span>
          <input
            id="baseURL"
            type="text"
            spellcheck="false"
            placeholder="https://openrouter.ai/api/v1"
          />
        </label>

        <!-- 桌宠人设（系统提示词）：留空用默认 -->
        <div class="field">
          <span class="label"
            >桌宠人设 <em>可选</em>
            <button id="resetPersona" type="button" class="linkbtn">
              恢复默认
            </button>
          </span>
          <textarea
            id="persona"
            rows="4"
            spellcheck="false"
            placeholder="留空＝用内置通用助手人设（文本里的 {name} 会自动替换成当前角色名）。想自定义就写它的定位、语气、能力边界…"
          ></textarea>
          <span class="hint">改完下次发消息即时生效，无需重启</span>
        </div>

        <label class="field">
          <span class="label">Obsidian 笔记库 <em>可选</em></span>
          <div class="row">
            <input
              id="vault"
              type="text"
              spellcheck="false"
              placeholder="/Users/.../你的库"
            />
            <!-- IconPark / Office / folder-close：选择文件夹 -->
            <button
              id="pickVault"
              type="button"
              title="选择文件夹"
              aria-label="选择文件夹"
            >
              <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
                <path
                  d="M5 8H22L26 14H43V40H5V8Z"
                  stroke="currentColor"
                  stroke-width="4"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <span class="hint">填了就本地检索笔记作参考；留空跳过</span>
        </label>

        <!-- 主动互动：时不时冒个气泡关心你 -->
        <div class="field">
          <span class="label">主动互动（时不时冒泡关心你）</span>
          <div class="row wakerow">
            <label class="switch">
              <input id="idleChatterEnabled" type="checkbox" />
              <span class="track"></span>
            </label>
            <span class="switchlabel" id="idleChatterLabel">关闭</span>
            <span class="spacer"></span>
            <span class="sublabel">每隔</span>
            <input
              id="idleChatterMin"
              type="number"
              step="5"
              min="5"
              max="180"
            />
            <span class="sublabel" style="margin-left: 6px">分钟</span>
          </div>
          <span class="hint">冒泡时配一声很轻的「叮」；默认每 25–45 分钟一次（填一个下限分钟数）</span>
        </div>

        <!-- 呼出聊天快捷键：双击修饰键 -->
        <div class="field">
          <span class="label">呼出聊天快捷键</span>
          <select id="chatHotkey">
            <option value="alt">双击 Option（默认）</option>
            <option value="meta">双击 Command</option>
            <option value="none">禁用</option>
          </select>
          <span class="hint">在任意应用里快速双击修饰键弹出聊天窗；首次需在系统设置允许辅助功能权限</span>
        </div>
      </main>
      <footer id="actions">
        <button id="openFile" type="button" title="编辑完整 config.json">
          高级
        </button>
        <span id="status"></span>
        <button id="test" type="button" class="ghost">测试</button>
        <button id="save" type="button">保存</button>
      </footer>
    </div>
    <script src="settings.js"></script>
  </body>
</html>
