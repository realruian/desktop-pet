<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- Lock down what the renderer may load; everything ships locally. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self';"
    />
    <title>Desktop Pet</title>
    <link rel="stylesheet" href="style.css" />
  </head>
    <body>
    <!-- Single canvas fills the transparent window; the pet is drawn here. -->
    <canvas id="stage"></canvas>
    <script src="pet-bond.js"></script>
    <script src="pet-speech.js"></script>
    <script src="pet-claude.js"></script>
    <script src="pet.js"></script>
  </body>
</html>
